<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<input type="password" id="pass" placeholder="Password">

<br><br>

<button class="btn-blue" onclick="adminLogin()">Login</button>

<br><br>

<div id="adminPanel" style="display:none">

<h3>Add Doctor</h3>

<input type="text" id="hospital" placeholder="Hospital">

<br><br>

<input type="text" id="department" placeholder="Department">

<br><br>

<input type="text" id="doctor" placeholder="Doctor Name">

<br><br>

<button class="btn-blue" onclick="addDoctor()">Add Doctor</button>

<hr>

<h3>Doctor List</h3>

<ul id="doctorList"></ul>

<hr>

<h3>Update Current Token</h3>

<input type="number" id="currentTokenInput">

<br><br>

<button class="btn-blue" onclick="updateToken()">Update</button>

<hr>

<h3>Patient List</h3>

<ul id="patientList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
  </html>
