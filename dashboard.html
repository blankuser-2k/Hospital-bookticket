<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="navbar">
<a href="index.html">
<button class="home-btn">Home</button>
</a>
</div>

<div class="container">

<h2>Patient Dashboard</h2>

<h3 id="welcome"></h3>

<p><i class="fa-solid fa-ticket"></i> Your Token: <span id="token"></span></p>

<p><i class="fa-solid fa-user-doctor"></i> Current Token: <span id="current"></span></p>

<p><i class="fa-solid fa-users"></i> Waiting Patients: <span id="waiting"></span></p>

<p><i class="fa-solid fa-clock"></i> Estimated Time: <span id="time"></span> mins</p>

</div>

<script src="script.js"></script>

</body>
</html>
